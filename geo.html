<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Géopolitique</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=DM+Mono:wght@300;400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #06080d; --ink: #e8e4dc; --muted: #6b7280;
  --accent: #60c8f0; --card-bg: #0d1117;
  --border: rgba(255,255,255,0.06);
  --header-h: 62px; --footer-h: 46px;
}
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--ink); font-family:'Outfit',sans-serif; -webkit-font-smoothing:antialiased; }
body::before { content:''; position:fixed; inset:0; z-index:100; pointer-events:none; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); opacity:.35; }
.bg-glow { position:fixed; inset:0; z-index:0; pointer-events:none; background: radial-gradient(ellipse 60% 50% at 20% 80%, rgba(96,200,240,0.04) 0%, transparent 70%), radial-gradient(ellipse 50% 40% at 80% 20%, rgba(100,180,255,0.04) 0%, transparent 70%); }

header { position:fixed; top:0; left:0; right:0; height:var(--header-h); z-index:50; padding:0 22px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); backdrop-filter:blur(12px); background:rgba(6,8,13,0.82); }
.logo { font-family:'Fraunces',serif; font-size:17px; font-weight:600; display:flex; align-items:center; gap:5px; }
.logo-dot { width:6px; height:6px; background:var(--accent); border-radius:50%; flex-shrink:0; }
.date-badge { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); margin-left:9px; }
.header-right { display:flex; align-items:center; gap:11px; }
.dots { display:flex; gap:5px; align-items:center; }
.dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.12); transition:all .3s; }
.dot.sub { width:4px; height:4px; background:rgba(96,200,240,0.3); }
.dot.active { background:var(--accent); transform:scale(1.35); }
.dot.sub.active { background:var(--accent); transform:scale(1.35); }
.counter { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); }

#stage { position:fixed; top:var(--header-h); bottom:var(--footer-h); left:0; right:0; z-index:10; overflow:hidden; }

.card {
  position:absolute; inset:10px 14px;
  background:var(--card-bg); border:1px solid var(--border); border-radius:20px;
  padding:24px 22px;
  display:flex; flex-direction:column; gap:13px;
  user-select:none; will-change:transform,opacity;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 20px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
  opacity:0; pointer-events:none; transform:translateX(54px) scale(0.97);
  overflow:hidden;
}
.card.active  { opacity:1; pointer-events:auto; transform:translateX(0) scale(1); z-index:2; }
.card.prev    { opacity:0; transform:translateX(-54px) scale(0.97); z-index:1; }
.card.next    { opacity:0; transform:translateX(54px)  scale(0.97); z-index:1; }

.card-meta { display:flex; align-items:center; justify-content:space-between; gap:8px; flex-shrink:0; }
.card-num { font-family:'Fraunces',serif; font-size:38px; font-weight:300; font-style:italic; line-height:1; color:rgba(255,255,255,0.06); flex-shrink:0; }
.cat-tag { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:1.4px; text-transform:uppercase; padding:4px 9px; border-radius:20px; border:1px solid; white-space:nowrap; }
.cont-badge { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:1px; flex-shrink:0; margin-left:auto; }

.divider { width:26px; height:1px; background:linear-gradient(90deg,var(--accent),transparent); flex-shrink:0; }

.card-title { font-family:'Fraunces',serif; font-size:clamp(16px,4.2vw,21px); font-weight:600; line-height:1.3; letter-spacing:-.3px; flex-shrink:0; }

.card-content {
  flex: 1 1 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: visible;
  gap: 10px;
  padding-bottom: 2px;
}
.card-body {
  font-size: 14px;
  line-height: 1.7;
  color: rgba(232,228,220,0.72);
  font-weight: 300;
  flex: 3 1 0;
  min-height: 0;
  overflow: hidden;
}
.why-box {
  background: rgba(96,200,240,0.05);
  border: 1px solid rgba(96,200,240,0.13);
  border-radius: 10px;
  padding: 10px 13px;
  display: flex;
  gap: 9px;
  align-items: center;
  flex: 1 1 0;
  min-height: 0;
  max-height: 30%;
  overflow: hidden;
  margin-bottom: 2px;
}
.why-text {
  font-size: 13px;
  line-height: 1.5;
  color: rgba(96,200,240,0.85);
  font-weight: 400;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
}
/* ── WHY EXPANDED OVERLAY ── */
#why-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 300;
  background: rgba(6,8,13,0.85);
  backdrop-filter: blur(8px);
  align-items: center;
  justify-content: center;
  padding: 24px;
}
#why-overlay.open {
  display: flex;
}
#why-expanded {
  background: rgba(96,200,240,0.05);
  border: 1px solid rgba(96,200,240,0.2);
  border-radius: 16px;
  padding: 20px 20px 20px 20px;
  max-width: 480px;
  width: 100%;
  position: relative;
  animation: expandIn 0.25s cubic-bezier(0.22,1,0.36,1);
}
#why-overlay.update-mode #why-expanded {
  background: rgba(251,191,36,0.05);
  border-color: rgba(251,191,36,0.2);
}
@keyframes expandIn {
  from { transform: scale(0.9); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}
#why-expanded-text {
  font-size: 14px;
  line-height: 1.7;
  color: rgba(96,200,240,0.9);
  font-weight: 400;
}
#why-overlay.update-mode #why-expanded-text {
  color: rgba(251,191,36,0.9);
}


/* ── WHY BOX CLICKABLE ── */
.why-box {
  cursor: default;
  transition: border-color 0.2s, background 0.2s;
}
.why-box.expandable {
  cursor: pointer;
  animation: pulseBorder 2s ease-in-out infinite;
}
.why-box.expandable:active { opacity: 0.8; }
@keyframes pulseBorder {
  0%, 100% { border-color: rgba(96,200,240,0.13); box-shadow: none; }
  50%       { border-color: rgba(96,200,240,0.6);  box-shadow: 0 0 8px rgba(96,200,240,0.2); }
}
.card.update-card .why-box.expandable {
  animation: pulseBorderUpdate 2s ease-in-out infinite;
}
@keyframes pulseBorderUpdate {
  0%, 100% { border-color: rgba(251,191,36,0.15); box-shadow: none; }
  50%       { border-color: rgba(251,191,36,0.6);  box-shadow: 0 0 8px rgba(251,191,36,0.2); }
}

/* ── UPDATE CARD ── *//* ── UPDATE CARD ── */
.card.update-card {
  border-color: rgba(251,191,36,0.2);
  background: #0f1008;
}
.update-badge {
  font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 3px 8px; border-radius: 20px;
  background: rgba(251,191,36,0.1);
  border: 1px solid rgba(251,191,36,0.3);
  color: #fbbf24;
  flex-shrink: 0;
}
.update-origin {
  font-size: 11px;
  color: rgba(251,191,36,0.5);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}
.card.update-card .why-box {
  background: rgba(251,191,36,0.05);
  border-color: rgba(251,191,36,0.15);
}
.card.update-card .why-text {
  color: rgba(251,191,36,0.85);
}
.card.update-card .why-icon::before { content: "🔄"; }
.card.update-card .why-icon { font-style: normal; }
.why-icon { font-size:13px; flex-shrink:0; margin-top:2px; }

footer { position:fixed; bottom:0; left:0; right:0; height:var(--footer-h); z-index:50; display:flex; align-items:center; justify-content:center; gap:16px; pointer-events:none; }
.hint { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.5px; color:rgba(255,255,255,0.12); transition:color .3s; }
.hint.on { color:rgba(255,255,255,0.38); }
.hint-sep { width:1px; height:12px; background:rgba(255,255,255,0.07); }

#loading { position:fixed; inset:0; z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center; background:var(--bg); gap:16px; transition:opacity .5s; }
.loader-logo { font-family:'Fraunces',serif; font-size:22px; font-weight:600; }
.loader-bar { width:100px; height:1px; background:var(--border); overflow:hidden; }
.loader-fill { height:100%; background:var(--accent); animation:load 1.6s ease-in-out infinite; }
@keyframes load { 0%{width:0%;margin-left:0%} 50%{width:60%;margin-left:20%} 100%{width:0%;margin-left:100%} }
.loader-sub { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:1px; }

#error-state { display:none; position:fixed; inset:0; z-index:200; flex-direction:column; align-items:center; justify-content:center; background:var(--bg); gap:12px; text-align:center; padding:40px; }
#error-state h2 { font-family:'Fraunces',serif; font-size:20px; }
#error-state p  { font-size:13px; color:var(--muted); max-width:300px; line-height:1.6; }

/* ── DESKTOP ── */
@media (min-width: 1024px) {
  :root { --header-h: 72px; --footer-h: 54px; }
  header { padding: 0 38px; }
  .logo { font-size: 19px; }
  .counter, .date-badge { font-size: 12px; }
  #stage { left: 16px; right: 16px; }
  .card {
    inset: 18px 0;
    left: 0;
    right: 0;
    margin: 0 auto;
    width: min(920px, calc(100vw - 72px));
    transform: translateX(54px) scale(0.98);
    padding: 32px 34px;
    border-radius: 24px;
    gap: 16px;
    contain: layout paint style;
    will-change: transform, opacity;
  }
  .card.active { transform: translateX(0) scale(1); }
  .card.prev { transform: translateX(-54px) scale(0.98); }
  .card.next { transform: translateX(54px) scale(0.98); }
  .card-title { font-size: clamp(24px, 2.1vw, 33px); line-height: 1.24; }
  .card-body { font-size: 17px; line-height: 1.9; }
  .why-box { padding: 14px 16px; max-height: 36%; }
  .why-text { font-size: 14px; line-height: 1.55; -webkit-line-clamp: 4; }
  .card-num { font-size: 52px; }
  .cat-tag { font-size: 11px; }
  .font-btn { width: 34px; height: 28px; font-size: 15px; }
  .hint { font-size: 12px; }
}

/* ── LANDSCAPE ── */
@media (orientation:landscape) and (max-height:500px) {
  :root { --header-h:44px; --footer-h:28px; }
  .card { inset:4px 12px; padding:12px 18px; gap:8px; }
  .card.active { overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .card-content { overflow:visible; gap:8px; }
  .card-body { flex:none; overflow:visible; }
  .why-box { flex:none; max-height:none; }
  .card-num { font-size:22px; }
  .card-title { font-size:clamp(13px,3vw,17px); }
}

/* ── BODY EXPANDABLE ── */
.card-body.body-expandable { cursor:pointer; }
.card-body.body-expandable::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:26px;
  background:linear-gradient(to bottom, transparent, var(--card-bg));
  pointer-events:none;
}
.card-body { position:relative; }
#why-overlay.body-mode #why-expanded { background:rgba(255,255,255,0.03); border-color:rgba(255,255,255,0.1); }
#why-overlay.body-mode #why-expanded-text { color:rgba(232,228,220,0.88); }

/* ── META RIGHT ── */
.meta-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end; }

/* ── FAV STAR ── */
.fav-star {
  background:none; border:none; cursor:pointer; font-size:15px; line-height:1; padding:2px 4px;
  color:rgba(255,255,255,0.35); transition:color .2s, transform .15s; flex-shrink:0;
}
.fav-star.fav-on { color:#fbbf24; text-shadow:0 0 12px rgba(251,191,36,0.35); }
.fav-star:active { transform:scale(0.92); }

/* ── Taille du texte (header, carte active uniquement) ── */
.header-font-wrap {
  display:flex; align-items:center; gap:4px; margin-right:6px; flex-shrink:0;
}
.header-font-wrap .font-btn {
  background:rgba(0,0,0,0.35); border:1px solid rgba(255,255,255,0.12); border-radius:8px;
  color:var(--ink); font-family:'DM Mono',monospace; font-size:14px; font-weight:500;
  line-height:1; min-width:36px; padding:6px 8px; cursor:pointer;
  transition:opacity .2s, border-color .2s;
}
.header-font-wrap .font-btn:active { opacity:.85; }

.card-body.scrolls {
  overflow-y:auto; -webkit-overflow-scrolling:touch; touch-action:pan-y;
}
.card-body.body-expandable.scrolls::after { display:none; }

/* ── FAV SAVE POPUP ── */
#fav-overlay {
  display:none; position:fixed; inset:0; z-index:400;
  background:rgba(6,8,13,0.88); backdrop-filter:blur(10px);
  align-items:center; justify-content:center; padding:24px;
}
#fav-overlay.open { display:flex; }
#fav-panel {
  background:var(--card-bg); border:1px solid var(--border); border-radius:16px; padding:20px;
  max-width:400px; width:100%;
}
#fav-panel h3 { font-family:'Fraunces',serif; font-size:16px; margin-bottom:12px; color:var(--ink); }
#fav-note { width:100%; min-height:88px; background:rgba(255,255,255,0.05); border:1px solid var(--border);
  border-radius:10px; padding:12px; color:var(--ink); font-family:'Outfit',sans-serif; font-size:14px; resize:vertical; }
#fav-actions { display:flex; gap:10px; margin-top:14px; justify-content:flex-end; }
#fav-cancel, #fav-save {
  font-family:'DM Mono',monospace; font-size:11px; padding:10px 16px; border-radius:10px; cursor:pointer; border:none;
}
#fav-cancel { background:transparent; color:var(--muted); }
#fav-save { background:var(--accent); color:#06080d; }

/* ── ASK BUTTON ── */
.ask-btn {
  background:none; border:1px solid rgba(255,255,255,0.1); border-radius:8px;
  cursor:pointer; font-size:13px; padding:3px 7px; opacity:.55;
  transition:opacity .2s, border-color .2s; flex-shrink:0; line-height:1;
}
.ask-btn:active { opacity:.9; }

/* ── CHAT OVERLAY (loupe) ── */
#ask-overlay {
  display:none; position:fixed; inset:0; z-index:300;
  background:rgba(6,8,13,0.88); backdrop-filter:blur(10px);
  align-items:flex-end; justify-content:center; padding-bottom:var(--footer-h);
}
#ask-overlay.open { display:flex; }
#ask-panel {
  background:var(--card-bg); border:1px solid var(--border);
  border-radius:20px 20px 0 0;
  max-width:540px; width:100%;
  max-height:90vh;
  height:min(90vh, 560px);
  overflow:hidden;
  display:flex; flex-direction:column;
  animation:slideUp .3s cubic-bezier(.22,1,.36,1);
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
#ask-header {
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  flex-shrink:0;
  position:sticky; top:0; z-index:10;
  background:var(--card-bg);
  padding:16px 18px 12px;
  border-bottom:1px solid rgba(255,255,255,0.07);
}
#ask-context-label {
  font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.5px;
  color:var(--ink); font-weight:500;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0;
}
.ask-header-actions { display:flex; align-items:center; gap:8px; flex-shrink:0; }
#ask-new-conv, #ask-close {
  background:none; border:none; cursor:pointer; font-family:'DM Mono',monospace;
  font-size:10px; color:var(--muted); letter-spacing:0.5px; padding:4px 6px;
}
#ask-new-conv { color:var(--accent); }
#ask-messages {
  flex:1 1 0;
  min-height:0;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  touch-action:pan-y;
  padding:14px 16px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.chat-sep {
  text-align:center; font-family:'DM Mono',monospace; font-size:10px; color:var(--muted);
  padding:8px 0; opacity:0.85;
}
.chat-msg { max-width:92%; padding:10px 13px; border-radius:14px; font-size:13px; line-height:1.65; word-break:break-word; }
.chat-msg-assistant {
  align-self:flex-start;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  color:rgba(232,228,220,0.9);
}
.chat-msg-user {
  align-self:flex-end;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.16);
  color:rgba(232,228,220,0.95);
}
.chat-msg p { margin:0 0 8px; }
.chat-msg p:last-child { margin-bottom:0; }
.chat-msg strong { color:rgba(232,228,220,1); font-weight:500; }
.chat-msg h4 {
  font-family:'Fraunces',serif; font-size:13px; font-weight:600;
  color:var(--accent); margin:0 0 6px;
}
.chat-msg ul { padding-left:16px; margin:4px 0; }
.chat-msg li { margin-bottom:4px; }
.chat-msg em { color:var(--muted); font-style:normal; font-size:12px; }
#ask-input-wrap {
  flex-shrink:0;
  position:sticky; bottom:0;
  z-index:5;
  background:var(--card-bg);
  border-top:1px solid rgba(255,255,255,0.07);
  padding:12px 16px 18px;
}
.ask-input-row { display:flex; gap:8px; }
#ask-input {
  flex:1; background:rgba(255,255,255,0.05); border:1px solid var(--border);
  border-radius:10px; padding:10px 14px; color:var(--ink);
  font-family:'Outfit',sans-serif; font-size:14px; outline:none;
}
#ask-input:focus { border-color:rgba(255,255,255,0.22); }
#ask-send {
  background:var(--accent); border:none; border-radius:10px; padding:10px 14px;
  cursor:pointer; font-family:'DM Mono',monospace; font-size:11px;
  color:#06080d; white-space:nowrap; transition:opacity .2s; flex-shrink:0;
}
#ask-send:disabled { opacity:.4; cursor:default; }
</style>
</head>
<body>
<div class="bg-glow"></div>

<div id="loading">
  <div class="loader-logo">Géopolitique <span style="display:inline-block;width:6px;height:6px;background:var(--accent);border-radius:50%;vertical-align:middle;"></span></div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
  <div class="loader-sub">Chargement…</div>
</div>
<div id="error-state">
  <h2>Impossible de charger</h2>
  <p>Le digest du jour n'est pas encore disponible.</p>
</div>

<header>
  <div style="display:flex;align-items:center;">
    <span class="logo">Géopolitique <span class="logo-dot"></span></span>
    <span class="date-badge" id="header-date"></span>
  </div>
  <div class="header-right">
    <div class="font-size-controls header-font-wrap" id="header-font-controls" aria-label="Taille du texte (carte affichée)">
      <button type="button" class="font-btn" data-delta="-1" title="Réduire">−</button>
      <button type="button" class="font-btn" data-delta="1" title="Agrandir">+</button>
    </div>
    <div class="dots" id="dots"></div>
    <span class="counter" id="counter">1/5</span>
  </div>
</header>

<div id="stage"></div>

<!-- Why / body expanded overlay -->
<div id="why-overlay">
  <div id="why-expanded">
    <p id="why-expanded-text"></p>
  </div>
</div>

<!-- Chat overlay (loupe) -->
<div id="ask-overlay">
  <div id="ask-panel">
    <div id="ask-header">
      <span id="ask-context-label">Discussion</span>
      <div class="ask-header-actions">
        <button type="button" id="ask-new-conv">Nouvelle conversation</button>
        <button type="button" id="ask-close">fermer ×</button>
      </div>
    </div>
    <div id="ask-messages"></div>
    <div id="ask-input-wrap">
      <div class="ask-input-row">
        <input id="ask-input" type="text" autocomplete="off" spellcheck="false" placeholder="Écris ton message…">
        <button type="button" id="ask-send">Envoyer →</button>
      </div>
    </div>
  </div>
</div>

<div id="fav-overlay">
  <div id="fav-panel">
    <h3 id="fav-panel-title">Enregistrer en favori</h3>
    <textarea id="fav-note" placeholder="Note optionnelle…"></textarea>
    <div id="fav-actions">
      <button type="button" id="fav-cancel">Annuler</button>
      <button type="button" id="fav-save">Enregistrer</button>
    </div>
  </div>
</div>

<footer>
  <span class="hint" id="hint-l">← préc.</span>
  <span class="hint-sep"></span>
  <span class="hint" id="hint-r">suiv. →</span>
</footer>

<script>
const COLORS = { 'Conflit':'#f87171','Diplomatie':'#60a5fa','Économie':'#34d399','Élection':'#a78bfa','Énergie':'#f59e0b','Sécurité':'#fb923c' };
const SPRING = 'transform 0.44s cubic-bezier(0.175,0.885,0.32,1.08), opacity 0.32s ease';

let slides = [], cur = 0;



function buildSlides(data) {
  slides = [];
  const news    = data.news    || [];
  const updates = data.updates || [];
  news.forEach((item, i) => {
    slides.push({ newsIdx:i, part:'single', item, isUpdate:false });
  });
  updates.forEach((item, i) => {
    slides.push({ newsIdx: news.length + i, part:'single', item, isUpdate:true });
  });
}

const stage = document.getElementById('stage');

function deriveCategory(item, fallback='Info') {
  const raw = String(item?.category || '').trim();
  if (raw && raw.toLowerCase() !== 'autre') return raw;
  const text = `${item?.title || ''} ${item?.summary || ''} ${item?.why || ''}`;
  const words = (text.match(/[A-Za-zÀ-ÿ0-9'-]+/g) || [])
    .map(w => w.toLowerCase())
    .filter(w => w.length >= 4 && !['avec','dans','pour','plus','cette','comme','entre','apres','avant','depuis','leurs','leurs','mais','aussi','sont','sera','etre','fait','sans','the','that'].includes(w));
  if (!words.length) return fallback;
  const w = words[0];
  return w.charAt(0).toUpperCase() + w.slice(1);
}

function makeCard(slide, idx) {
  const { newsIdx, item, isUpdate } = slide;
  const categoryLabel = deriveCategory(item, isUpdate ? 'Mise à jour' : 'Info');
  const color = COLORS[categoryLabel] || COLORS[item.category] || 'var(--accent)';
  const div = document.createElement('div');
  div.className = 'card' + (isUpdate ? ' update-card' : '');
  div.dataset.idx = idx;

  const numLabel = isUpdate
    ? '<span class="update-badge">Mise à jour</span>'
    : `<span class="card-num">0${newsIdx+1}</span>`;

  const cleanText = t => t ? t.replace(/\[\d+\]/g, '').trim() : t;
  div.dataset.newsIdx = String(newsIdx);
  div.dataset.isUpdate = isUpdate ? '1' : '0';
  div.innerHTML = `
    <div class="card-meta">
      ${numLabel}
      <div class="meta-right">
        <span class="cat-tag" style="color:${color};border-color:${color}44;background:${color}11;">${categoryLabel}</span>
        <button type="button" class="fav-star" data-news-idx="${newsIdx}" title="Favori" aria-label="Favori">☆</button>
        <button type="button" class="ask-btn" onclick="openChat(this)">🔍</button>
      </div>
    </div>
    ${isUpdate && item.original ? `<div class="update-origin">↳ suite : ${item.original}</div>` : '<div class="divider"></div>'}
    <div class="card-title">${cleanText(item.title)}</div>
    <div class="card-content">
      <div class="card-body">${cleanText(item.summary)}</div>
      <div class="why-box"><span class="why-icon">💡</span><span class="why-text">${cleanText(item.why)}</span></div>
    </div>
  `;
  return div;
}

function fontSizeStorageKey(newsIdx) {
  return 'digestFs_' + THEME + '_' + newsIdx;
}

function readDigestFontSizeFor(newsIdx) {
  let fs = 14;
  try {
    const v = localStorage.getItem(fontSizeStorageKey(newsIdx));
    if (v != null) fs = Math.max(10, Math.min(20, parseInt(v, 10) || 14));
    else {
      const legacy = localStorage.getItem('digestFontSize');
      if (legacy != null) fs = Math.max(10, Math.min(20, parseInt(legacy, 10) || 14));
    }
  } catch (_) {}
  return fs;
}

function writeDigestFontSizeFor(newsIdx, fs) {
  try { localStorage.setItem(fontSizeStorageKey(newsIdx), String(fs)); } catch (_) {}
}

function fitTextToBox(card) {
  const newsIdx = parseInt(card.dataset.newsIdx, 10) || 0;
  const fs = readDigestFontSizeFor(newsIdx);
  const body = card.querySelector('.card-body');
  if (body) {
    body.style.fontSize = fs + 'px';
    body.classList.remove('body-expandable', 'scrolls');
    if (body.scrollHeight > body.clientHeight + 2) {
      body.classList.add('body-expandable', 'scrolls');
    }
  }
  const whyText = card.querySelector('.why-text');
  const whyBox  = card.querySelector('.why-box');
  if (whyText && whyBox) {
    whyBox.classList.remove('expandable');
    if (whyText.scrollHeight > whyText.offsetHeight + 2) {
      whyBox.classList.add('expandable');
    }
  }
}

function renderAll() {
  stage.innerHTML = '';
  slides.forEach((s, i) => {
    const card = makeCard(s, i);
    card.classList.add(i === cur ? 'active' : i < cur ? 'prev' : 'next');
    stage.appendChild(card);
  });
  // Fit text after a frame so layout is computed
  requestAnimationFrame(() => {
    stage.querySelectorAll('.card').forEach(fitTextToBox);
    refreshFavStars();
  });
  updateChrome();
}

function updateChrome() {
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  slides.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === cur ? ' active' : '');
    dotsEl.appendChild(d);
  });
  const newsTotal = slides.length;
  const isUpd = slides[cur] && slides[cur].isUpdate;
  document.getElementById('counter').textContent = isUpd
    ? `MAJ ${slides.filter((s,i) => s.isUpdate && i <= cur).length}/${slides.filter(s => s.isUpdate).length}`
    : `${cur+1}/${slides.filter(s => !s.isUpdate).length}`;
  document.getElementById('hint-l').className = 'hint' + (cur > 0 ? ' on' : '');
  document.getElementById('hint-r').className = 'hint' + (cur < slides.length-1 ? ' on' : '');
}

function getCardEl(i) { return stage.querySelector(`.card[data-idx="${i}"]`); }

function goTo(next) {
  if (next < 0 || next >= slides.length || next === cur) return;
  const dir     = next > cur ? -1 : 1;
  const leaving = getCardEl(cur);
  const arriving= getCardEl(next);
  if (leaving)  { leaving.style.transition = SPRING;  leaving.style.transform  = `translateX(${dir*105}%) scale(0.94)`; leaving.style.opacity = '0'; leaving.style.pointerEvents = 'none'; }
  if (arriving) { arriving.style.transition = SPRING; arriving.style.transform = 'translateX(0) scale(1)'; arriving.style.opacity = '1'; arriving.style.pointerEvents = 'auto'; }
  cur = next;
  updateChrome();
  setTimeout(() => {
    stage.querySelectorAll('.card').forEach(c => {
      const i = parseInt(c.dataset.idx);
      c.style.cssText = '';
      c.className = 'card ' + (i === cur ? 'active' : i < cur ? 'prev' : 'next');
    });
  }, 460);
}

/* ── SWIPE ── */
let startX=0, startY=0, dx=0, tracking=false, swiping=false, raf=null;
let touchScrollBody = null;

document.body.addEventListener('touchmove', e => { if (swiping) e.preventDefault(); }, { passive:false });

function onStart(x,y,ev) {
  touchScrollBody = ev && ev.target && ev.target.closest ? ev.target.closest('.card-body.scrolls') : null;
  startX=x; startY=y; dx=0; tracking=true; swiping=false;
}

function onMove(x,y) {
  if (!tracking) return;
  const diffX=x-startX, diffY=y-startY;
  if (touchScrollBody) {
    if (Math.abs(diffY) > Math.abs(diffX) && Math.abs(diffY) > 12) {
      tracking = false;
      touchScrollBody = null;
      return;
    }
  }
  if (!swiping) {
    if (Math.abs(diffX)<8 && Math.abs(diffY)<8) return;
    if (Math.abs(diffY)>Math.abs(diffX)) { tracking=false; touchScrollBody=null; return; }
    swiping=true;
  }
  dx=diffX;
  if (raf) cancelAnimationFrame(raf);
  raf=requestAnimationFrame(() => {
    const active=getCardEl(cur);
    if (!active) return;
    active.style.transition='none';
    active.style.transform=`translateX(${dx}px) rotate(${(dx/window.innerWidth)*5}deg)`;
    const prog=Math.abs(dx)/window.innerWidth;
    const neighbor = dx<0 ? getCardEl(cur+1) : getCardEl(cur-1);
    if (neighbor) {
      const off=54*(1-prog);
      neighbor.style.transition='none';
      neighbor.style.transform=`translateX(${dx<0?off:-off}px) scale(${0.97+0.03*prog})`;
      neighbor.style.opacity=String(0.3+0.7*prog);
    }
  });
}

function onEnd() {
  if (!tracking) return;
  tracking=false;
  if (!swiping) { dx=0; return; }
  swiping=false;
  if (raf) cancelAnimationFrame(raf);
  const threshold=window.innerWidth*0.22;
  if      (dx < -threshold && cur < slides.length-1) { goTo(cur+1); }
  else if (dx >  threshold && cur > 0)               { goTo(cur-1); }
  else {
    const active  = getCardEl(cur);
    const neighbor= dx<0 ? getCardEl(cur+1) : getCardEl(cur-1);
    if (active)   { active.style.transition=SPRING; active.style.transform='translateX(0) scale(1)'; }
    if (neighbor) { neighbor.style.transition=SPRING; neighbor.style.transform=`translateX(${dx<0?'54px':'-54px'}) scale(0.97)`; neighbor.style.opacity='0'; }
    setTimeout(() => {
      stage.querySelectorAll('.card').forEach(c => {
        const i=parseInt(c.dataset.idx); c.style.cssText='';
        c.className='card '+(i===cur?'active':i<cur?'prev':'next');
      });
    }, 460);
  }
  dx=0;
}

stage.addEventListener('touchstart',  e=>onStart(e.touches[0].clientX,e.touches[0].clientY,e),{passive:true});
stage.addEventListener('touchmove',   e=>onMove(e.touches[0].clientX,e.touches[0].clientY), {passive:true});
stage.addEventListener('touchend',    onEnd,{passive:true});
stage.addEventListener('touchcancel', onEnd,{passive:true});
stage.addEventListener('mousedown',   e=>onStart(e.clientX,e.clientY,e));
window.addEventListener('mousemove',  e=>{ if(tracking) onMove(e.clientX,e.clientY); });
window.addEventListener('mouseup',    onEnd);
window.addEventListener('keydown',    e=>{ if(e.key==='ArrowRight'||e.key==='ArrowDown') goTo(cur+1); if(e.key==='ArrowLeft'||e.key==='ArrowUp') goTo(cur-1); });

/* ── WHY / BODY OVERLAY ── */
const whyOverlay = document.getElementById('why-overlay');
const whyExpandedText = document.getElementById('why-expanded-text');
document.addEventListener('click', e => {
  const box = e.target.closest('.why-box');
  if (box && box.classList.contains('expandable')) {
    const text = box.querySelector('.why-text');
    if (!text) return;
    whyExpandedText.textContent = text.textContent;
    const card = box.closest('.card');
    whyOverlay.classList.remove('body-mode');
    whyOverlay.classList.toggle('update-mode', card && card.classList.contains('update-card'));
    whyOverlay.classList.add('open');
    return;
  }
  const body = e.target.closest('.card-body.body-expandable');
  if (body) {
    whyExpandedText.textContent = body.textContent.trim();
    whyOverlay.classList.remove('update-mode');
    whyOverlay.classList.add('body-mode', 'open');
  }
});

whyOverlay.addEventListener('click', e => {
  if (e.target === whyOverlay) whyOverlay.classList.remove('open', 'body-mode', 'update-mode');
});

/* ── THEME / STORAGE ── */
const THEME = 'geo';
const THEME_LABEL = 'Géopolitique';
const THEME_COLOR = '#60c8f0';
let digestDate = '';
const WELCOME_TEXT = 'Je suis là pour approfondir ce sujet. Que veux-tu savoir ?';

const _PX_KEY = atob('__PX_KEY_B64__');
const askOverlay = document.getElementById('ask-overlay');
const askInput = document.getElementById('ask-input');
const askSend = document.getElementById('ask-send');
const askMessages = document.getElementById('ask-messages');
const askCtxLabel = document.getElementById('ask-context-label');
const favOverlay = document.getElementById('fav-overlay');
const favNote = document.getElementById('fav-note');
let _chatNewsIdx = 0;
let _chatCard = null;

function chatStorageKey(newsIdx) { return 'chat_' + THEME + '_' + newsIdx; }

function loadChatState(newsIdx) {
  try {
    const raw = localStorage.getItem(chatStorageKey(newsIdx));
    if (!raw) return { cardTitle: '', messages: [], archives: [] };
    const o = JSON.parse(raw);
    return {
      cardTitle: o.cardTitle || '',
      messages: Array.isArray(o.messages) ? o.messages : [],
      archives: Array.isArray(o.archives) ? o.archives : []
    };
  } catch (_) {
    return { cardTitle: '', messages: [], archives: [] };
  }
}

function saveChatState(newsIdx, state) {
  try { localStorage.setItem(chatStorageKey(newsIdx), JSON.stringify(state)); } catch (_) {}
}

function favStorageKey(newsIdx) {
  const d = digestDate || 'nodate';
  return 'fav_' + THEME + '_' + newsIdx + '_' + d;
}

function getCardContext(card) {
  const title = card.querySelector('.card-title')?.textContent?.trim() || '';
  const summary = card.querySelector('.card-body')?.textContent?.trim() || '';
  const why = card.querySelector('.why-text')?.textContent?.trim() || '';
  return { title, summary, why };
}

function formatAskResponse(text) {
  text = text.replace(/\[\d+\]/g, '').trim();
  text = text.replace(/^#{1,3}\s+(.+)$/gm, '<h4>$1</h4>');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<strong>$1</strong>');
  const lines = text.split('\n');
  const out = [];
  let inList = false;
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) { if (inList) { out.push('</ul>'); inList = false; } out.push(''); continue; }
    if (/^[-•*]\s+/.test(trimmed)) {
      if (!inList) { out.push('<ul>'); inList = true; }
      out.push('<li>' + trimmed.replace(/^[-•*]\s+/, '') + '</li>');
    } else {
      if (inList) { out.push('</ul>'); inList = false; }
      out.push(trimmed);
    }
  }
  if (inList) out.push('</ul>');
  const blocks = out.join('\n').split(/\n{2,}/);
  return blocks.map(b => {
    b = b.trim();
    if (!b) return '';
    if (b.startsWith('<h4>') || b.startsWith('<ul>') || b.endsWith('</ul>')) return b;
    if (b.includes('<ul>')) return b;
    return '<p>' + b.replace(/\n/g, '<br>') + '</p>';
  }).filter(Boolean).join('');
}

function renderChatMessages(newsIdx) {
  askMessages.innerHTML = '';
  const st = loadChatState(newsIdx);
  const archives = st.archives || [];
  const messages = st.messages || [];

  const appendBubble = (role, html) => {
    const div = document.createElement('div');
    div.className = 'chat-msg ' + (role === 'user' ? 'chat-msg-user' : 'chat-msg-assistant');
    div.innerHTML = html;
    askMessages.appendChild(div);
  };

  archives.forEach((arch, ai) => {
    (arch.messages || []).forEach(m => {
      if (m.role === 'user' || m.role === 'assistant') {
        appendBubble(m.role, m.role === 'assistant' ? formatAskResponse(m.content) : '<p>' + escapeHtml(m.content) + '</p>');
      }
    });
    const hasMore = (ai < archives.length - 1) || messages.length > 0;
    if (hasMore) {
      const sep = document.createElement('div');
      sep.className = 'chat-sep';
      sep.textContent = '— Session précédente —';
      askMessages.appendChild(sep);
    }
  });

  messages.forEach(m => {
    if (m.role === 'user' || m.role === 'assistant') {
      appendBubble(m.role, m.role === 'assistant' ? formatAskResponse(m.content) : '<p>' + escapeHtml(m.content) + '</p>');
    }
  });

  askMessages.scrollTop = askMessages.scrollHeight;
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function messagesForApi(st) {
  const out = [];
  (st.messages || []).forEach(m => {
    if (m.role === 'assistant' && m.content === WELCOME_TEXT) return;
    if (m.role === 'user' || m.role === 'assistant') out.push({ role: m.role, content: m.content });
  });
  return out;
}

function openChat(btn) {
  const card = btn.closest('.card');
  _chatCard = card;
  const newsIdx = parseInt(card.dataset.newsIdx, 10) || 0;
  _chatNewsIdx = newsIdx;
  const { title, summary, why } = getCardContext(card);
  askCtxLabel.textContent = 'Discussion';
  let st = loadChatState(newsIdx);
  st.cardTitle = title;
  if (!st.messages.length && !(st.archives && st.archives.length)) {
    st.messages.push({ role: 'assistant', content: WELCOME_TEXT, timestamp: Date.now() });
    saveChatState(newsIdx, st);
  }
  renderChatMessages(newsIdx);
  askInput.value = '';
  askOverlay.classList.add('open');
  setTimeout(() => askInput.focus(), 320);
}

function newConversation() {
  const newsIdx = _chatNewsIdx;
  let st = loadChatState(newsIdx);
  if (st.messages && st.messages.length) {
    st.archives = st.archives || [];
    st.archives.push({ savedAt: Date.now(), messages: st.messages.slice() });
    st.archives = st.archives.slice(-5);
  }
  st.messages = [{ role: 'assistant', content: WELCOME_TEXT, timestamp: Date.now() }];
  saveChatState(newsIdx, st);
  const card = _chatCard;
  if (card) {
    const t = card.querySelector('.card-title')?.textContent?.trim() || '';
    st.cardTitle = t;
    saveChatState(newsIdx, st);
  }
  renderChatMessages(newsIdx);
}

document.getElementById('ask-new-conv').addEventListener('click', newConversation);

askSend.addEventListener('click', async () => {
  const val = askInput.value.trim();
  if (!val) return;
  const newsIdx = _chatNewsIdx;
  const st = loadChatState(newsIdx);
  st.messages.push({ role: 'user', content: val, timestamp: Date.now() });
  saveChatState(newsIdx, st);
  askInput.value = '';
  renderChatMessages(newsIdx);
  askSend.disabled = true;
  const card = _chatCard || stage.querySelector('.card[data-news-idx="' + newsIdx + '"]');
  const { title, summary, why } = card ? getCardContext(card) : { title: '', summary: '', why: '' };
  const sys = `Tu es un assistant concis. Réponds en français.\n- Pour une question simple (qui est X, qu'est-ce que Y, définition), réponds en 2-3 phrases maximum, pas de titres ni de listes.\n- Pour une question complexe qui demande vraiment une explication détaillée, structure avec des titres (## Titre) et du gras (**terme**).\nContexte de la carte :\nTitre : ${title}\nRésumé : ${summary.slice(0, 1200)}\nPourquoi : ${why.slice(0, 400)}\nN'inclus jamais de références [1][2] ni d'URLs.`;
  const hist = messagesForApi(loadChatState(newsIdx));
  try {
    const r = await fetch('https://api.perplexity.ai/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${_PX_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'sonar',
        messages: [{ role: 'system', content: sys }].concat(hist),
        max_tokens: 500,
        temperature: 0.3
      })
    });
    const data = await r.json();
    const raw = data.choices?.[0]?.message?.content || 'Pas de réponse.';
    const st2 = loadChatState(newsIdx);
    st2.messages.push({ role: 'assistant', content: raw.replace(/\[\d+\]/g, '').trim(), timestamp: Date.now() });
    saveChatState(newsIdx, st2);
    renderChatMessages(newsIdx);
  } catch (_) {
    const st2 = loadChatState(newsIdx);
    st2.messages.push({ role: 'assistant', content: 'Erreur de connexion.', timestamp: Date.now() });
    saveChatState(newsIdx, st2);
    renderChatMessages(newsIdx);
  }
  askSend.disabled = false;
});

askInput.addEventListener('keydown', e => { if (e.key === 'Enter') askSend.click(); });
document.getElementById('ask-close').addEventListener('click', () => askOverlay.classList.remove('open'));
askOverlay.addEventListener('click', e => { if (e.target === askOverlay) askOverlay.classList.remove('open'); });

/* ── FAVORIS ── */
let _favTargetNewsIdx = null;

function refreshFavStars() {
  stage.querySelectorAll('.fav-star').forEach(btn => {
    const n = parseInt(btn.dataset.newsIdx, 10);
    const key = favStorageKey(n);
    let on = false;
    try { on = localStorage.getItem(key) != null; } catch (_) {}
    btn.classList.toggle('fav-on', on);
    btn.textContent = on ? '★' : '☆';
  });
}

document.addEventListener('click', e => {
  const star = e.target.closest('.fav-star');
  if (!star || !stage.contains(star)) return;
  e.stopPropagation();
  const newsIdx = parseInt(star.dataset.newsIdx, 10);
  const key = favStorageKey(newsIdx);
  let existing = null;
  try { existing = localStorage.getItem(key); } catch (_) {}
  if (existing) {
    if (!confirm('Retirer ce favori ?')) return;
    try { localStorage.removeItem(key); } catch (_) {}
    refreshFavStars();
    return;
  }
  _favTargetNewsIdx = newsIdx;
  favNote.value = '';
  favOverlay.classList.add('open');
});

document.getElementById('fav-cancel').addEventListener('click', () => { favOverlay.classList.remove('open'); _favTargetNewsIdx = null; });
document.getElementById('fav-save').addEventListener('click', () => {
  if (_favTargetNewsIdx == null) return;
  const card = stage.querySelector('.card[data-news-idx="' + _favTargetNewsIdx + '"]');
  const title = card?.querySelector('.card-title')?.textContent?.trim() || '';
  const note = favNote.value.trim();
  const slideIdx = parseInt(card.dataset.idx, 10) || 0;
  const baseUrl = location.origin + location.pathname;
  const payload = {
    title,
    theme: THEME_LABEL,
    themeColor: THEME_COLOR,
    date: digestDate,
    url: baseUrl + '?only=' + slideIdx,
    note,
    savedAt: Date.now()
  };
  try { localStorage.setItem(favStorageKey(_favTargetNewsIdx), JSON.stringify(payload)); } catch (_) {}
  favOverlay.classList.remove('open');
  _favTargetNewsIdx = null;
  refreshFavStars();
});
favOverlay.addEventListener('click', e => { if (e.target === favOverlay) favOverlay.classList.remove('open'); });

/* ── Taille + / − (carte active uniquement) ── */
document.addEventListener('click', e => {
  const b = e.target.closest('#header-font-controls .font-btn');
  if (!b) return;
  e.stopPropagation();
  const active = stage.querySelector('.card.active');
  if (!active) return;
  const newsIdx = parseInt(active.dataset.newsIdx, 10) || 0;
  const delta = parseInt(b.dataset.delta, 10) || 0;
  let fs = readDigestFontSizeFor(newsIdx) + delta;
  fs = Math.max(10, Math.min(20, fs));
  writeDigestFontSizeFor(newsIdx, fs);
  fitTextToBox(active);
});

/* ── INIT ── */
(async()=>{
  const loading=document.getElementById('loading');
  const errorState=document.getElementById('error-state');
  let data;
  try { const r=await fetch('geo_today.json?t='+Date.now()); if(!r.ok) throw new Error(); data=await r.json(); }
  catch { loading.style.opacity='0'; setTimeout(()=>{ loading.style.display='none'; errorState.style.display='flex'; },400); return; }
  document.getElementById('header-date').textContent=data.date||'';
  digestDate = data.date || '';
  buildSlides(data);
  const params = new URLSearchParams(location.search);
  if (params.has('only')) {
    const o = parseInt(params.get('only'), 10);
    if (!isNaN(o) && slides.length && o >= 0 && o < slides.length) {
      slides = [slides[o]];
      cur = 0;
    }
  }
  renderAll();
  loading.style.opacity='0';
  setTimeout(()=>loading.style.display='none',500);

  // Re-render on orientation change so layout recalculates cleanly
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      const c = cur;
      renderAll();
      cur = c;
      // Restore active card without animation
      stage.querySelectorAll('.card').forEach(card => {
        const i = parseInt(card.dataset.idx);
        card.style.cssText = '';
        card.className = 'card ' + (i === cur ? 'active' : i < cur ? 'prev' : 'next');
      });
      updateChrome();
    }, 150);
  });
})();
</script>
</body>
</html>
