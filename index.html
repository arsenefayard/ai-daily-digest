<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>AI Digest</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=DM+Mono:wght@300;400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #06080d;
  --ink: #e8e4dc;
  --muted: #6b7280;
  --accent: #c8f064;
  --card-bg: #0d1117;
  --border: rgba(255,255,255,0.06);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Outfit', sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ── GRAIN OVERLAY ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 100;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.35;
}

/* ── BACKGROUND GLOW ── */
.bg-glow {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 50% at 20% 80%, rgba(200,240,100,0.04) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 20%, rgba(100,180,255,0.04) 0%, transparent 70%);
}

/* ── HEADER ── */
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  padding: 20px 28px 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  background: rgba(6,8,13,0.7);
}

.header-left { display: flex; align-items: baseline; gap: 10px; }

.logo {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--ink);
}

.logo-dot {
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  display: inline-block;
  margin-left: 3px;
  margin-bottom: 2px;
  vertical-align: middle;
}

.date-badge {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.5px;
}

/* ── PROGRESS DOTS ── */
.dots {
  display: flex; gap: 6px; align-items: center;
}
.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--border);
  border: 1px solid rgba(255,255,255,0.15);
  transition: all 0.3s ease;
}
.dot.active {
  background: var(--accent);
  border-color: var(--accent);
  transform: scale(1.3);
}

/* ── COUNTER ── */
.counter {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--muted);
}

/* ── SWIPE STAGE ── */
#stage {
  position: fixed; inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  padding: 80px 20px 80px;
  overflow: hidden;
}

/* ── CARDS WRAPPER ── */
#cards-wrapper {
  position: relative;
  width: 100%; max-width: 480px;
  height: 100%;
}

/* ── CARD ── */
.card {
  position: absolute;
  inset: 0;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px 28px 28px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  cursor: grab;
  user-select: none;
  will-change: transform;
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.03),
    0 24px 60px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.05);
  opacity: 0;
  pointer-events: none;
  transform: translateX(60px) scale(0.96);
}

.card.active {
  opacity: 1;
  pointer-events: auto;
  transform: translateX(0) scale(1);
  z-index: 2;
}

.card.active.settling {
  transition: transform 0.42s cubic-bezier(0.22,1,0.36,1), opacity 0.4s ease;
}

.card.prev {
  opacity: 0;
  transform: translateX(-60px) scale(0.96);
  z-index: 1;
}

.card.prev.settling {
  transition: transform 0.42s cubic-bezier(0.22,1,0.36,1), opacity 0.3s ease;
}

.card.next-peek {
  opacity: 0;
  transform: translateX(60px) scale(0.96);
  z-index: 1;
}

.card.next-peek.settling {
  transition: transform 0.42s cubic-bezier(0.22,1,0.36,1), opacity 0.3s ease;
}

/* ── CARD TOP ── */
.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.card-number {
  font-family: 'Fraunces', serif;
  font-size: 56px;
  font-weight: 300;
  font-style: italic;
  line-height: 1;
  color: rgba(255,255,255,0.06);
  flex-shrink: 0;
  margin-top: -4px;
}

.category-tag {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 5px 10px;
  border-radius: 20px;
  border: 1px solid rgba(200,240,100,0.25);
  color: var(--accent);
  background: rgba(200,240,100,0.06);
  white-space: nowrap;
}

/* ── DIVIDER ── */
.divider {
  width: 32px; height: 1px;
  background: linear-gradient(90deg, var(--accent) 0%, transparent 100%);
  flex-shrink: 0;
}

/* ── TITLE ── */
.card-title {
  font-family: 'Fraunces', serif;
  font-size: clamp(19px, 4vw, 23px);
  font-weight: 600;
  line-height: 1.3;
  color: var(--ink);
  letter-spacing: -0.3px;
}

/* ── SUMMARY ── */
.card-summary {
  font-size: 14.5px;
  line-height: 1.75;
  color: rgba(232,228,220,0.7);
  font-weight: 300;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* ── WHY BOX ── */
.why-box {
  background: rgba(200,240,100,0.05);
  border: 1px solid rgba(200,240,100,0.12);
  border-radius: 10px;
  padding: 14px 16px;
  display: flex;
  gap: 10px;
  flex-shrink: 0;
  overflow: hidden;
  align-items: flex-start;
  margin-top: auto;
}

.why-icon {
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 1px;
}

.why-text {
  font-size: 13px;
  line-height: 1.6;
  color: rgba(200,240,100,0.85);
  font-weight: 400;
}

/* ── SWIPE HINT ── */
.swipe-hint {
  position: fixed;
  bottom: 22px; left: 0; right: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  pointer-events: none;
}

.hint-arrow {
  display: flex; align-items: center; gap: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: rgba(255,255,255,0.15);
  letter-spacing: 0.5px;
  transition: color 0.3s;
}
.hint-arrow.active { color: rgba(255,255,255,0.4); }

.hint-sep {
  width: 1px; height: 14px;
  background: rgba(255,255,255,0.08);
}

/* ── LOADING ── */
#loading {
  position: fixed; inset: 0; z-index: 200;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--bg);
  gap: 16px;
  transition: opacity 0.5s ease;
}

.loader-logo {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--ink);
}

.loader-bar {
  width: 120px; height: 1px;
  background: var(--border);
  border-radius: 1px;
  overflow: hidden;
}

.loader-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 1px;
  animation: load 1.8s ease-in-out infinite;
}

@keyframes load {
  0% { width: 0%; margin-left: 0%; }
  50% { width: 60%; margin-left: 20%; }
  100% { width: 0%; margin-left: 100%; }
}

.loader-text {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
}

/* ── ERROR ── */
#error-state {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
  background: var(--bg);
  text-align: center;
  padding: 40px;
}
#error-state h2 {
  font-family: 'Fraunces', serif;
  font-size: 20px; color: var(--ink);
}
#error-state p {
  font-size: 13px; color: var(--muted); max-width: 300px; line-height: 1.6;
}

/* ── TILT ON DRAG ── */
.card.dragging {
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.06),
    0 32px 80px rgba(0,0,0,0.7),
    inset 0 1px 0 rgba(255,255,255,0.07);
}
</style>
</head>
<body>

<div class="bg-glow"></div>

<!-- Loading -->
<div id="loading">
  <div class="loader-logo">AI Digest<span class="logo-dot"></span></div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
  <div class="loader-text">Chargement...</div>
</div>

<!-- Error -->
<div id="error-state">
  <h2>Impossible de charger</h2>
  <p>Le digest du jour n'est pas encore disponible. Réessaie dans quelques instants.</p>
</div>

<!-- Header -->
<header>
  <div class="header-left">
    <span class="logo">AI Digest<span class="logo-dot"></span></span>
    <span class="date-badge" id="header-date">—</span>
  </div>
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="dots" id="dots"></div>
    <span class="counter" id="counter">1/5</span>
  </div>
</header>

<!-- Stage -->
<div id="stage">
  <div id="cards-wrapper"></div>
</div>

<!-- Swipe hint -->
<div class="swipe-hint">
  <div class="hint-arrow" id="hint-left">← préc.</div>
  <div class="hint-sep"></div>
  <div class="hint-arrow active" id="hint-right">suiv. →</div>
</div>

<script>
const CATEGORIES = {
  'Modèle': '#a78bfa',
  'Entreprise': '#60a5fa',
  'Recherche': '#34d399',
  'Application': '#f59e0b',
  'Régulation': '#f87171',
};

let news = [];
let current = 0;

// ── FETCH DATA ──
async function fetchData() {
  try {
    const r = await fetch('today.json?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    return data;
  } catch(e) {
    console.error('Fetch error:', e);
    return null;
  }
}

// ── BUILD CARDS ──
function buildCards(data) {
  news = data.news || [];
  document.getElementById('header-date').textContent = data.date || '';

  const wrapper = document.getElementById('cards-wrapper');
  wrapper.innerHTML = '';

  news.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' active' : ' next-peek');
    card.dataset.index = i;

    const catColor = CATEGORIES[item.category] || 'var(--accent)';

    card.innerHTML = `
      <div class="card-top">
        <span class="card-number">0${i+1}</span>
        <span class="category-tag" style="color:${catColor};border-color:${catColor}33;background:${catColor}0d;">${item.category || 'IA'}</span>
      </div>
      <div class="divider"></div>
      <div class="card-title">${item.title}</div>
      <div class="card-summary">${item.summary}</div>
      <div class="why-box">
        <span class="why-icon">💡</span>
        <span class="why-text">${item.why}</span>
      </div>
    `;

    wrapper.appendChild(card);
  });

  buildDots();
  updateUI();
}

// ── DOTS ──
function buildDots() {
  const container = document.getElementById('dots');
  container.innerHTML = '';
  news.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    container.appendChild(d);
  });
}

// ── UPDATE UI STATE ──
function updateUI(animate) {
  const cards = document.querySelectorAll('.card');
  cards.forEach((c, i) => {
    c.className = 'card';
    if (i === current) c.classList.add('active');
    else if (i < current) c.classList.add('prev');
    else c.classList.add('next-peek');
    if (animate) c.classList.add('settling');
  });

  // Dots
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === current);
  });

  // Counter
  document.getElementById('counter').textContent = `${current+1}/${news.length}`;

  // Hints
  document.getElementById('hint-left').classList.toggle('active', current > 0);
  document.getElementById('hint-right').classList.toggle('active', current < news.length - 1);
}

// ── NAVIGATE ──
function goTo(index, animate = true) {
  if (index < 0 || index >= news.length) return;
  current = index;
  updateUI(animate);
}

// ── DRAG / SWIPE ──
let startX = 0, startY = 0, dx = 0;
let isSwiping = false;   // axe confirmé comme horizontal
let isTracking = false;  // touch/mouse actif
let animFrame = null;

const stage = document.getElementById('stage');

// Désactive le scroll natif sur toute la page mobile
document.body.addEventListener('touchmove', e => {
  if (isSwiping) e.preventDefault();
}, { passive: false });

function getActiveCard() { return document.querySelector('.card.active'); }
function getCardAt(i) { return document.querySelectorAll('.card')[i]; }

function onStart(x, y) {
  startX = x; startY = y; dx = 0;
  isTracking = true; isSwiping = false;
}

function onMove(x, y) {
  if (!isTracking) return;
  const diffX = x - startX;
  const diffY = y - startY;

  // Détection axe dès 8px de mouvement
  if (!isSwiping) {
    if (Math.abs(diffX) < 8 && Math.abs(diffY) < 8) return;
    if (Math.abs(diffY) > Math.abs(diffX)) { isTracking = false; return; } // scroll vertical → abandon
    isSwiping = true;
  }

  dx = diffX;

  // Animation RAF pour fluidité maximale
  if (animFrame) cancelAnimationFrame(animFrame);
  animFrame = requestAnimationFrame(() => {
    const card = getActiveCard();
    if (!card) return;

    // Carte active suit le doigt 1:1
    const rotate = (dx / window.innerWidth) * 6;
    card.style.transition = 'none';
    card.style.transform = `translateX(${dx}px) rotate(${rotate}deg)`;

    // Carte suivante/précédente se révèle en parallèle
    const progress = Math.abs(dx) / window.innerWidth; // 0 → 1
    const peekScale = 0.96 + 0.04 * progress;
    const peekOpacity = 0.4 + 0.6 * progress;
    const peekOffset = 60 * (1 - progress);

    if (dx < 0 && current < news.length - 1) {
      const next = getCardAt(current + 1);
      if (next) {
        next.style.transition = 'none';
        next.style.transform = `translateX(${peekOffset}px) scale(${peekScale})`;
        next.style.opacity = peekOpacity;
      }
    } else if (dx > 0 && current > 0) {
      const prev = getCardAt(current - 1);
      if (prev) {
        prev.style.transition = 'none';
        prev.style.transform = `translateX(${-peekOffset}px) scale(${peekScale})`;
        prev.style.opacity = peekOpacity;
      }
    }
  });
}

function onEnd() {
  if (!isTracking) return;
  isTracking = false;
  if (!isSwiping) return;
  isSwiping = false;
  if (animFrame) cancelAnimationFrame(animFrame);

  const threshold = window.innerWidth * 0.25;

  const nextIndex = dx < -threshold && current < news.length - 1 ? current + 1
    : dx > threshold && current > 0 ? current - 1
    : current;

  // Reset tous les styles inline, PUIS applique la transition settling
  document.querySelectorAll('.card').forEach(c => {
    c.style.transition = 'none';
    c.style.transform = '';
    c.style.opacity = '';
  });

  // Force reflow pour que le reset soit appliqué avant l'animation
  document.body.offsetHeight;

  dx = 0;
  current = nextIndex;
  updateUI(true);
}

// Touch — passive:false uniquement sur start pour pouvoir preventDefault dans move
stage.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
stage.addEventListener('touchmove', e => onMove(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
stage.addEventListener('touchend', onEnd, { passive: true });
stage.addEventListener('touchcancel', onEnd, { passive: true });

// Mouse
stage.addEventListener('mousedown', e => onStart(e.clientX, e.clientY));
window.addEventListener('mousemove', e => { if (isTracking) onMove(e.clientX, e.clientY); });
window.addEventListener('mouseup', onEnd);

// Keyboard
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current + 1, true);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goTo(current - 1, true);
});

// ── INIT ──
(async () => {
  const data = await fetchData();
  const loading = document.getElementById('loading');
  const errorState = document.getElementById('error-state');

  if (!data || !data.news || data.news.length === 0) {
    loading.style.opacity = '0';
    setTimeout(() => {
      loading.style.display = 'none';
      errorState.style.display = 'flex';
    }, 400);
    return;
  }

  buildCards(data);

  loading.style.opacity = '0';
  setTimeout(() => loading.style.display = 'none', 500);
})();
</script>
</body>
</html>
