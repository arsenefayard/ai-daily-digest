name: Daily Digest (tous les thèmes)

on:
  schedule:
    - cron: '*/5 6 * * *'   # Toutes les 5 min à 6h UTC → 8h CEST (été, UTC+2)
    - cron: '*/5 7 * * *'   # Toutes les 5 min à 7h UTC → 8h CET (hiver, UTC+1)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-time:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Vérifier heure et déduplication
        id: check
        run: |
          HOUR=$(TZ="Europe/Paris" date +%-H)
          TODAY=$(TZ="Europe/Paris" date +%d/%m/%Y)
          echo "Heure France : ${HOUR}h | Date : $TODAY"

          # Fenêtre stricte : 8h en France
          if [ "$HOUR" -ne 8 ]; then
            echo "Hors fenêtre (${HOUR}h ≠ 8h), arrêt."
            echo "should_run=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Déduplication : le digest a-t-il déjà été envoyé aujourd'hui ?
          EXISTING=$(curl -sf "https://raw.githubusercontent.com/${{ github.repository }}/gh-pages/today.json" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('date',''))" 2>/dev/null || echo "")
          if [ "$EXISTING" = "$TODAY" ]; then
            echo "Digest déjà envoyé aujourd'hui ($TODAY), arrêt."
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "Lancement du digest pour $TODAY."
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  send-digest:
    needs: check-time
    if: needs.check-time.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Déployer les pages HTML (avec clé injectée)
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git \
            --branch gh-pages --single-branch gh_pages_dir

          python3 - <<'PYEOF'
          import os
          key = os.environ.get("PERPLEXITY_API_KEY", "")
          files = ["index.html","geo.html","eco.html","sport.html","music.html","science.html","culture.html","history.html"]
          for f in files:
              if not os.path.exists(f):
                  print(f"⚠️ {f} manquant")
                  continue
              content = open(f, encoding="utf-8").read().replace("__PERPLEXITY_KEY__", key)
              with open(f"gh_pages_dir/{f}", "w", encoding="utf-8") as out:
                  out.write(content)
              print(f"✅ {f} prêt")
          PYEOF

          cd gh_pages_dir
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add *.html
          git diff --cached --quiet && echo "Aucun changement HTML" || git commit -m "chore: update HTML pages"
          git push

      - name: Digest IA
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python ai_digest.py

      - name: Digest Géopolitique
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python geo_digest.py

      - name: Digest Économie
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python eco_digest.py

      - name: Digest Sport
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python sport_digest.py

      - name: Digest Musique
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python music_digest.py

      - name: Digest Science
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python science_digest.py

      - name: Digest Culture Générale
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python culture_digest.py

      - name: Digest Histoire
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python history_digest.py

      - name: Envoyer l'email combiné
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          GITHUB_REPO: ${{ github.repository }}
        run: python send_email.py
